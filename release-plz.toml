[workspace]
# Reuse the existing cliff.toml — release.yml's git-cliff step also
# reads it, so duplicating the rules into a [changelog] section here
# would create a second source of truth.
changelog_config = "cliff.toml"

# crates.io publish stays in publish-crates.yml (manual workflow_dispatch).
publish = false

# release.yml owns GitHub Release creation (3-OS binaries + C ABI +
# git-cliff notes via softprops/action-gh-release). release-plz only
# pushes the tag; it does not create the Release object.
git_release_enable = false
