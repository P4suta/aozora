# CI-only overlay merged in via `COMPOSE_FILE=docker-compose.yml:docker-compose.ci.yml`.
#
# The base compose file's sccache backend is the on-disk `cargo-target` /
# `sccache` named volumes — perfect for local dev where the volumes
# persist across `docker compose run` invocations, useless on GitHub
# Actions where every job starts on a fresh ephemeral runner with empty
# named volumes. This overlay flips the in-container sccache to the
# GitHub Actions cache backend instead, so the same sccache that already
# wraps every workspace cargo build now reads / writes the run-shared
# Actions cache, and the second job onward sees a warm cache.
#
# `mozilla-actions/sccache-action` (added in
# `.github/actions/setup-dev-image`) installs the sccache CLI on the
# runner host and exports ACTIONS_CACHE_URL + ACTIONS_RUNTIME_TOKEN.
# This overlay forwards those two GHA-magic env vars into the
# dev / ci containers; the in-image sccache picks them up via
# SCCACHE_GHA_ENABLED=true and routes its cache traffic over the
# Actions Cache API.

services:
  dev:
    environment:
      SCCACHE_GHA_ENABLED: "true"
      ACTIONS_CACHE_URL: "${ACTIONS_CACHE_URL:-}"
      ACTIONS_RUNTIME_TOKEN: "${ACTIONS_RUNTIME_TOKEN:-}"

  ci:
    environment:
      SCCACHE_GHA_ENABLED: "true"
      ACTIONS_CACHE_URL: "${ACTIONS_CACHE_URL:-}"
      ACTIONS_RUNTIME_TOKEN: "${ACTIONS_RUNTIME_TOKEN:-}"
