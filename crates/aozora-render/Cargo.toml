[package]
name        = "aozora-render"
description = "HTML / serialisation renderers for the aozora AST"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
readme.workspace       = true
keywords.workspace     = true
categories.workspace   = true

[lints]
workspace = true

[dependencies]
# Borrowed-AST native renderers (Plan B.3). The legacy owned-AST
# implementation continues to live in aozora-parser; this crate now
# carries the borrowed-AST mirrors that consume `aozora_lex::lex_into_arena`
# output directly. The aozora-parser dep is retained for the legacy
# façade re-exports until Plan B.5 retires them.
aozora-parser = { workspace = true, features = ["html"] }
aozora-spec   = { workspace = true }
aozora-syntax = { workspace = true }
aozora-lex    = { workspace = true }

[dev-dependencies]
pretty_assertions = { workspace = true }
proptest          = { workspace = true }
aozora-test-utils = { workspace = true }
