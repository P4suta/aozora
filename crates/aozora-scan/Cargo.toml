[package]
name        = "aozora-scan"
description = "SIMD-friendly trigger-byte scanner for the Aozora notation lexer"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
readme.workspace       = true
keywords.workspace     = true
categories.workspace   = true

# Internal — until SIMD backends + runtime dispatch land we keep the
# crate path-only. crates.io publication is a future ADR.
publish     = false

[lints]
workspace = true

[dependencies]
aozora-spec = { workspace = true }
memchr      = { workspace = true }

[dev-dependencies]
proptest  = { workspace = true }
criterion = { workspace = true }

[[bench]]
name    = "scalar_scan"
harness = false
