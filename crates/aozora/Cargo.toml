[package]
name        = "aozora"
description = "Aozora Bunko notation parser — single front door (Document + AozoraTree)"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
readme.workspace       = true
keywords.workspace     = true
categories.workspace   = true

[lints]
workspace = true

[dependencies]
# Plan B-complete: borrowed-AST native surface. Document wraps
# `aozora_lex::lex_into_arena` and AozoraTree borrows from a
# `bumpalo`-backed arena owned by Document. The `aozora-parser`
# dep was retired in Plan B.5 — no public surface here references
# the legacy comrak-driven path.
aozora-render   = { workspace = true }
aozora-parallel = { workspace = true }
aozora-lex      = { workspace = true }
aozora-syntax   = { workspace = true }
aozora-spec     = { workspace = true }
