[package]
name        = "aozora-ffi"
description = "C ABI driver for the aozora parser — opaque handle + JSON output"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
readme.workspace       = true
keywords.workspace     = true
categories.workspace   = true

# Driver crate — never published to crates.io. Consumers link against
# the `cdylib` / `staticlib` artefacts produced by `cargo build` and
# include the C header generated by `build.rs` at
# `$OUT_DIR/aozora.h` (also copied to `target/<profile>/aozora.h`).
publish     = false

# NOTE: this crate intentionally does NOT inherit the workspace
# `unsafe_code = "forbid"` lint. The C ABI surface inherently
# requires unsafe blocks for `extern "C"`, raw pointer dereference,
# and `Box::into_raw` / `Box::from_raw`. We re-state the rest of the
# workspace's lint discipline locally so the FFI crate stays held to
# the same standard everywhere else.
[lints.rust]
unsafe_code = "deny"
non_ascii_idents = "deny"
missing_debug_implementations = "warn"
missing_copy_implementations = "warn"

[dependencies]
aozora     = { workspace = true }
serde      = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

[build-dependencies]
# Generates `aozora.h` from `#[no_mangle] extern "C"` items in
# `src/lib.rs`. Output lands at `$OUT_DIR/aozora.h` and is copied to
# `target/<profile>/aozora.h` for ergonomic host-side consumption.
cbindgen = { version = "0.29", default-features = false }

[lib]
crate-type = ["lib", "cdylib", "staticlib"]
