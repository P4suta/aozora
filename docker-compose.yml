# aozora workspace compose file. Every `just` target runs a command here.
#
# Services:
#   dev  — interactive development (VS Code Dev Containers attaches here)
#   ci   — identical to dev; used by CI and `just ci` for provenance separation
#   book — lean mdbook serve / build container (port 3000)
#
# Volumes are named so cargo registry + target + sccache persist between runs.

name: aozora

x-common-env: &common-env
  CARGO_HOME: /workspace/.cargo
  CARGO_TARGET_DIR: /workspace/target
  RUSTC_WRAPPER: sccache
  SCCACHE_DIR: /workspace/.sccache
  # sccache cannot cache crates compiled with cargo's incremental mode.
  # Cargo defaults incremental=true for workspace members in dev/test profiles,
  # which silently bypasses sccache for the very crates we build most often.
  # Pinning this here applies to every service that inherits x-common-env.
  CARGO_INCREMENTAL: "0"
  SCCACHE_CACHE_SIZE: "10G"
  RUST_BACKTRACE: "1"
  # Use mold (already apt-installed in the Dockerfile toolchain stage).
  # The Dockerfile also writes a /root/.cargo/config.toml with the same
  # intent, but CARGO_HOME=/workspace/.cargo above means cargo never
  # reads it; cargo's own config-discovery is rooted at $CARGO_HOME and
  # only walks ancestor `.cargo/config.toml` files from the project
  # directory upward. Setting these two env vars short-circuits the
  # whole config-file dance and is the documented override path:
  # cargo's RUSTFLAGS / CARGO_TARGET_<TARGET>_LINKER take precedence
  # over any config.toml entries.
  RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
  CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: "clang"
  TERM: ${TERM:-xterm-256color}
  # /workspace is bind-mounted from the host as a non-root UID, but the
  # container runs as root. Git otherwise refuses operations with
  # "dubious ownership"; whitelist via the GIT_CONFIG_* triplet rather
  # than baking a `git config` invocation into the image (keeps the
  # whitelist local to the compose surface and trivially removable).
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: "safe.directory"
  GIT_CONFIG_VALUE_0: "/workspace"

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: aozora-dev:local
    working_dir: /workspace
    environment: *common-env
    volumes:
      - .:/workspace:cached
      - cargo-registry:/workspace/.cargo/registry
      - cargo-git:/workspace/.cargo/git
      - cargo-target:/workspace/target
      - sccache:/workspace/.sccache
    init: true
    tty: true
    stdin_open: true

  ci:
    build:
      context: .
      dockerfile: Dockerfile
      target: ci
    image: aozora-ci:local
    working_dir: /workspace
    environment:
      <<: *common-env
      CI: "true"
    volumes:
      # `:cached` (not `:ro`): a `:ro` bind mount HIDES `/workspace/{target,
      # .cargo,.sccache}` that were `mkdir -p`-ed in the image (overlayfs
      # bind-mount semantics — the source dir replaces image contents),
      # which then blocks the named-volume mountpoints below from
      # attaching at runtime ("mkdirat ... read-only file system"). The
      # runner is ephemeral; `:cached` is safe and the canonical CI mode.
      - .:/workspace:cached
      - cargo-registry:/workspace/.cargo/registry
      - cargo-git:/workspace/.cargo/git
      - cargo-target:/workspace/target
      - sccache:/workspace/.sccache

  book:
    # Lean container with just `mdbook` / `mdbook-mermaid` / `lychee` —
    # no Rust toolchain, no sccache. Use `just book-serve` for live
    # preview at http://localhost:3000, `just book-build` for one-shot
    # rendering, `just book-linkcheck` for lychee.
    build:
      context: .
      dockerfile: Dockerfile
      target: book
    image: aozora-book:local
    working_dir: /workspace/crates/aozora-book
    volumes:
      - .:/workspace:cached
    ports:
      - "3000:3000"

volumes:
  cargo-registry:
  cargo-git:
  cargo-target:
  sccache:
