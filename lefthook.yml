# Pre-commit / pre-push hooks — every command runs inside the dev
# container through `just`, never directly on the host.
#
# Enable after clone:  `just hooks`
# Disable:             `just hooks-uninstall`
#
# Reference: https://lefthook.dev/configuration/

pre-commit:
  parallel: true
  skip:
    - rebase
    - merge
  commands:
    # `cargo fmt --all` (writes). Any reformat is re-staged automatically
    # so the commit carries the fixed formatting. `fmt-check` is kept out
    # of pre-commit because fixing-and-restaging is strictly more helpful
    # than failing the commit.
    fmt:
      glob: "*.rs"
      run: just fmt
      stage_fixed: true
    clippy:
      glob: "*.{rs,toml}"
      run: just clippy
    typos:
      run: just typos

commit-msg:
  commands:
    # Conventional Commits — scope is optional but the type + style is enforced.
    # `{1}` is lefthook's positional reference to the commit-message file path
    # that git passes to the hook.
    conventional:
      run: |
        docker compose run --rm --no-TTY dev bash -c \
          "grep -E '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: .{1,}' {1} > /dev/null \
            || { echo 'Commit message must follow Conventional Commits (https://www.conventionalcommits.org/)'; exit 1; }"

pre-push:
  parallel: true
  skip:
    - rebase
  commands:
    test:
      run: just test
    deny:
      run: just deny
    # RustSec advisory scan — paired with `deny` so a published CVE
    # in any transitive dep blocks the push, not just a license /
    # ban-list violation.
    audit:
      run: just audit

# After `git pull` / `git merge` (i.e. when Cargo.lock or Cargo.toml
# may have moved underneath us), surface dependency freshness so the
# developer sees stale gates without having to remember to ask.
# Non-blocking: deps-status returns non-zero only when stale, and
# `|| true` ensures the merge still completes — the notice is
# informational, not a gate.
post-merge:
  commands:
    deps-status:
      glob: "{Cargo.toml,Cargo.lock,crates/*/Cargo.toml}"
      run: just deps-status || true

post-checkout:
  commands:
    deps-status:
      glob: "{Cargo.toml,Cargo.lock,crates/*/Cargo.toml}"
      run: just deps-status || true
