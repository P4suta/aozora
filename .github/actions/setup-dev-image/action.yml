# Composite action: install `just` on the runner and provision the
# aozora dev image (pulled from GHCR or, if pull fails, built locally
# from the in-tree Dockerfile).
#
# Used by every ci.yml job that invokes `just <target>`. Pulling the
# pre-built image from ghcr.io/p4suta/aozora-dev cuts ~30 minutes off
# the wall-clock relative to building the image inline; falling back
# to `docker compose build` keeps CI self-bootstrapping when GHCR is
# unavailable (first push, registry outage, fork PR without packages
# read).

name: setup-dev-image
description: Pull (or build) the aozora dev image and install `just` on the runner.

runs:
  using: composite
  steps:
    - uses: taiki-e/install-action@v2
      with:
        tool: just

    # Install the sccache CLI on the runner host and export
    # ACTIONS_CACHE_URL + ACTIONS_RUNTIME_TOKEN so the in-container
    # sccache (compose env: RUSTC_WRAPPER=sccache, SCCACHE_GHA_ENABLED=true
    # via docker-compose.ci.yml) can route its cache traffic over the
    # GitHub Actions Cache API. The on-disk `sccache` named volume in
    # docker-compose.yml is fine for local dev where it persists across
    # invocations, but every CI runner starts with empty named volumes,
    # so on Actions we steer sccache at the run-shared GHA cache instead.
    - uses: mozilla-actions/sccache-action@v0.0.10

    - name: Enable docker-compose CI overlay
      shell: bash
      run: echo "COMPOSE_FILE=docker-compose.yml:docker-compose.ci.yml" >> "$GITHUB_ENV"

    # Cache the dev image tar on the runner host. Each CI job otherwise
    # spends ~32 s pulling aozora-dev:latest from GHCR; with six docker
    # compose jobs in ci.yml that's ~190 s of pure network overhead per
    # workflow run. The cache key is keyed off Dockerfile +
    # docker-compose.yml so a real image rebuild invalidates it
    # automatically.
    - name: Cache dev image tar
      id: dev-image-cache
      uses: actions/cache@v4
      with:
        path: /tmp/aozora-dev.tar
        key: aozora-dev-image-${{ hashFiles('Dockerfile', 'docker-compose.yml') }}

    - name: Load dev image from cache (cache hit)
      if: steps.dev-image-cache.outputs.cache-hit == 'true'
      shell: bash
      run: |
        set -euo pipefail
        docker load -i /tmp/aozora-dev.tar
        docker tag aozora-dev:local aozora-ci:local
        echo "::notice title=dev image::Loaded aozora-dev:local from runner cache"

    # docker/login-action authenticates the runner against GHCR using
    # the standard GITHUB_TOKEN. Skipped on fork PRs where the token
    # lacks `packages: read` — those runs go through the build
    # fallback below. Same-repo runs always log in.
    - name: Log in to GHCR (cache miss only, same-repo runs only)
      if: ${{ steps.dev-image-cache.outputs.cache-hit != 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Pull dev image (GHCR) or fall back to local build (cache miss)
      if: steps.dev-image-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        if docker pull ghcr.io/p4suta/aozora-dev:latest; then
          docker tag ghcr.io/p4suta/aozora-dev:latest aozora-dev:local
          docker tag ghcr.io/p4suta/aozora-dev:latest aozora-ci:local
          echo "::notice title=dev image::Pulled aozora-dev:latest from GHCR"
        else
          echo "::warning title=dev image::GHCR pull failed; falling back to local Dockerfile build"
          docker compose build dev
          docker tag aozora-dev:local aozora-ci:local
        fi
        # Save the tar so actions/cache picks it up on the post-action.
        docker save aozora-dev:local -o /tmp/aozora-dev.tar
