# aozora CI
#
# Architecture:
#   - The dev container image is built and published by `dev-image.yml`
#     to ghcr.io/p4suta/aozora-dev:latest on Dockerfile / compose
#     changes.
#   - This workflow PULLS that image (via the `setup-dev-image`
#     composite action) and invokes `just <target>` on the runner host.
#     `just` recipes wrap each command in `docker compose run dev cargo
#     ...` (Justfile policy: never invoke cargo on the host directly).
#     Running `just` on the runner — instead of `docker compose run ci
#     just <target>` — avoids Docker-in-Docker: the previous nested
#     pattern hit `bash: docker: command not found` because the `ci`
#     container has no docker client.
#   - If the GHCR image is unavailable (first run before dev-image.yml
#     publishes, or transient registry outage), the composite action
#     falls back to `docker compose build` against the local Dockerfile.
#     Slower path but the same correctness guarantee.
#
# Action SHAs are pinned; Dependabot bumps weekly.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

env:
  DOCKER_BUILDKIT: "1"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  msrv:
    # Verify that the pinned MSRV (1.95.0) still builds. Uses the
    # native runner toolchain rather than the dev image, because the
    # point is exercising a clean rustc 1.95.0 install, which the
    # image has no mechanism to downgrade to.
    name: msrv (rust 1.95.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install Rust 1.95.0 (MSRV)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - run: cargo check --workspace --all-targets

  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - name: Check Conventional Commits
        run: |
          range="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          while read -r sha subject; do
            if ! echo "$subject" | grep -qE '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: .{1,}'; then
              echo "::error::Commit $sha has non-conventional subject: $subject"
              exit 1
            fi
          done < <(git log --format='%H %s' "$range")

  # `just lint` is a recipe-deps chain (fmt-check → clippy → typos →
  # strict-code) that ran serially in a single job, so its wall time
  # was the sum of the four sub-recipes. Split into a matrix so each
  # sub-recipe runs in parallel; the wall time collapses to whichever
  # one is slowest (clippy in practice). The dev image cache and the
  # GHA-backed sccache make the per-job container start near-free
  # after the first cache-miss run.
  lint:
    name: lint (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [fmt-check, clippy, typos, strict-code]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/setup-dev-image
      - run: just ${{ matrix.target }}

  # Single Rust build-test-coverage gate. `just coverage` calls
  # `cargo llvm-cov nextest run --workspace`, which compiles every test
  # binary and runs it once — exactly what a separate `just build &&
  # just test` pair would have done, plus the region-coverage report.
  # Splitting them into two jobs duplicated the workspace cargo build
  # for ~3 extra wall-clock minutes per push without adding signal.
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/setup-dev-image
      - run: just coverage

  audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [deny, audit, udeps]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/setup-dev-image
      - run: just ${{ matrix.target }}

  # Phase L4 — wire-format / TS-types drift gate.
  #
  # Both artefacts are committed to the repo (`crates/aozora-book/src/wire/
  # schema-*.json` and `crates/aozora-wasm/types/aozora_types.d.ts`)
  # and must stay in sync with the live Rust types they're generated
  # from. This job re-runs codegen and `git diff`-style asserts the
  # output is byte-identical to what's checked in. Forgetting to
  # regenerate after touching `aozora::wire::*` or any `pub const ALL`
  # array now fails CI rather than landing silently.
  drift-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/setup-dev-image
      - run: just drift-gate

  # Phase O4 — WPT-style conformance suite. Runs every fixture
  # through the parser and asserts every `must`-tier case passes.
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/setup-dev-image
      - run: just conformance

  # Phase M1 — Pandoc end-to-end smoke. Builds the CLI, runs
  # `aozora pandoc input.txt --format html` against a tiny ruby
  # fixture, and checks the resulting HTML carries the expected
  # Span class. Catches regressions in either the
  # `AozoraTree → pandoc_ast::Pandoc` projection or the JSON
  # round-trip through `pandoc -f json -t html`.
  pandoc-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: pandoc-smoke
      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pandoc
      - name: Build aozora CLI
        run: cargo build --release -p aozora-cli
      - name: Pandoc round-trip smoke
        shell: bash
        run: |
          set -euxo pipefail
          input='｜青梅《おうめ》'
          html=$(printf '%s' "$input" | ./target/release/aozora pandoc --format html)
          echo "$html"
          echo "$html" | grep -F 'aozora-ruby' > /dev/null
          echo "$html" | grep -F '青梅' > /dev/null
          echo "$html" | grep -F 'おうめ' > /dev/null

  # C ABI smoke test — build aozora-ffi as a cdylib, link the C
  # harness against it, run end-to-end. Validates that
  # `cargo build -p aozora-ffi` produces a working library AND that
  # the cbindgen build script generates `aozora.h` cleanly.
  smoke-ffi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: smoke-ffi
      - run: bash crates/aozora-ffi/tests/c_smoke/run.sh

  # WASM build verification — install wasm32 target + wasm-pack, run
  # `wasm-pack build crates/aozora-wasm --target web --release`.
  # Build-only: no npm publish.
  wasm-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build wasm-pack package
        run: wasm-pack build --target web --release crates/aozora-wasm

  # aarch64 cross-compile + qemu-user execution of the SIMD scanner
  # tests. The NEON Teddy kernel only builds on `target_arch =
  # "aarch64"`; this job runs the proptest cross-validation against
  # NaiveScanner inside qemu so a broken intrinsic mapping lights
  # up on PR. Build-only on x86 hosts wouldn't catch correctness
  # regressions.
  cross-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cross
      - uses: Swatinem/rust-cache@v2
        with:
          key: cross-aarch64
      - name: cross test (aarch64-unknown-linux-gnu, aozora-scan)
        run: cross test --target aarch64-unknown-linux-gnu -p aozora-scan

  # wasm32-wasip1 codegen check for the SIMD scanner. Build-only:
  # `cargo test` is structurally impossible on wasm32 because the
  # crate's proptest dev-dep pulls in `rusty-fork` / `wait-timeout`,
  # both of which require Unix `fork()` / process-control APIs that
  # wasm32-wasip1 lacks (verified locally: `wait-timeout` fails to
  # compile on the target). The in-source `#[cfg(test)]` proptests
  # run on the native host as part of the main `coverage` /
  # `cross-aarch64` jobs, and the WasmKernel chunk-level proptest
  # is structurally identical to the NeonKernel one that does run
  # under qemu-user. The build check here catches regressions in
  # WASM SIMD intrinsic mapping (`i8x16_swizzle`, `u8x16_shr`,
  # `u8x16_shuffle` const-index encoding) at the codegen level.
  wasm-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      # The `targets:` parameter on `dtolnay/rust-toolchain` does
      # install the rust-std component, but cargo occasionally
      # cannot find it (`E0463: can't find crate for core`) — most
      # commonly when a self-hosted runner has a pre-existing
      # `~/.cargo` from a prior step that pinned a different
      # toolchain. Running `rustup target add` explicitly after the
      # toolchain action settles the lookup deterministically.
      - name: Install wasm32-wasip1 target
        run: rustup target add wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm-test
      - name: cargo build --target wasm32-wasip1 (aozora-scan)
        run: cargo build --target wasm32-wasip1 -p aozora-scan

  # Python wheel build verification — install maturin, build the
  # `aozora-py` wheel against the runner's stock Python. Build-only:
  # no PyPI publish.
  python-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - uses: Swatinem/rust-cache@v2
        with:
          key: maturin
      - name: Install maturin
        run: pip install --upgrade maturin
      - name: Build wheel
        run: maturin build --release -F extension-module --manifest-path crates/aozora-py/Cargo.toml

  # mdbook handbook build verification — builds `crates/aozora-book/`
  # in a lean container so a missing chapter, broken include, or
  # SUMMARY desync surfaces on PR rather than at deploy time.
  # Independent buildx cache scope (`book`) keeps this job decoupled
  # from the heavier dev image.
  book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          target: book
          tags: aozora-book:local
          load: true
          cache-from: type=gha,scope=book
          cache-to: type=gha,mode=max,scope=book
      - name: Install mermaid assets into the book directory
        # `mermaid.min.js` + `mermaid-init.js` are .gitignored vendor JS
        # that mdbook-mermaid regenerates from its own embedded copy.
        # `book.toml` lists them as `additional-js`, so `mdbook build`
        # fails with "failed to open mermaid.min.js for hashing" unless
        # we install them first.
        run: docker run --rm -v "$PWD:/workspace" -w /workspace/crates/aozora-book aozora-book:local mdbook-mermaid install .
      - name: mdbook build
        run: docker run --rm -v "$PWD:/workspace" -w /workspace/crates/aozora-book aozora-book:local mdbook build
      - name: lychee link verification (internal + external)
        # Configuration (concurrency, retries, accept codes, exclude
        # paths) lives in `crates/aozora-book/lychee.toml` — same file
        # `just book-linkcheck` reads, so local + CI behaviour match.
        run: |
          docker run --rm -v "$PWD:/workspace" -w /workspace/crates/aozora-book aozora-book:local \
            lychee --config lychee.toml 'book/**/*.html'
