# release-plz: open Release PRs on every main push, push the tag once merged.
# Tag push triggers release.yml which builds 3-OS binaries + aozora-ffi C ABI
# and publishes the GitHub Release.
#
# Why a GitHub App token instead of GITHUB_TOKEN:
#   GitHub Actions' default GITHUB_TOKEN cannot trigger other workflow runs.
#   The tag release-plz pushes here would not fire release.yml without an
#   installation token. See https://release-plz.dev/docs/github/token.
#
# Required secrets:
#   APP_ID            — numeric ID of the "aozora-release-plz" GitHub App
#   APP_PRIVATE_KEY   — its PEM private key
# One-time setup is in docs/release.md.

name: release-plz

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-plz-pr:
    name: release-plz / release-pr
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-pr-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz (release-pr)
        uses: release-plz/action@v0
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  release-plz-release:
    name: release-plz / release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: release-plz-release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz (release)
        uses: release-plz/action@v0
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
