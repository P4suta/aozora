# Publish the aozora handbook + rustdoc to GitHub Pages.
#
# aozora does not currently publish to crates.io, so docs.rs is not an
# option for the API reference. Instead we build rustdoc on the runner,
# build the mdbook handbook from `crates/aozora-book/`, layer them at
# `/aozora/` (handbook root) and `/aozora/api/aozora/` (rustdoc), and
# deploy the whole site to GitHub Pages.
#
# Layout produced:
#   https://p4suta.github.io/aozora/                ← mdbook handbook
#   https://p4suta.github.io/aozora/api/            ← rustdoc landing redirect
#   https://p4suta.github.io/aozora/api/aozora/     ← cargo doc landing for the top-level facade
#
# Docs builds use the native runner toolchain rather than the dev
# Docker image, because the Pages deploy actions expect artefacts on
# the runner filesystem. mdbook is installed via the upstream
# `peaceiris/actions-mdbook` action; the mermaid preprocessor is
# installed manually since the action does not bundle preprocessors.

name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy in flight at a time; queue the rest so we never
# partially overwrite the Pages bucket.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: docs

      - uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: latest

      - name: Install mdbook-mermaid
        run: cargo install --locked mdbook-mermaid

      - name: Install mermaid assets into the book directory
        # Writes `mermaid.min.js` + `mermaid-init.js` next to `book.toml`
        # so the `additional-js = [...]` declaration in book.toml resolves.
        # Those files are .gitignored in the source tree (vendor JS that
        # the preprocessor regenerates), so CI has to install them on the
        # runner before `mdbook build` runs.
        run: mdbook-mermaid install crates/aozora-book

      - name: Build rustdoc
        run: cargo doc --workspace --no-deps --document-private-items

      - name: Build mdbook handbook
        run: mdbook build crates/aozora-book

      - name: Assemble site
        run: |
          set -euo pipefail
          mkdir -p site
          cp -r crates/aozora-book/book/. site/
          mkdir -p site/api
          cp -r target/doc/. site/api/
          # /api/ landing redirects to the top-level facade crate's docs.
          cat > site/api/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <title>aozora — rustdoc</title>
          <meta http-equiv="refresh" content="0; url=./aozora/index.html">
          <link rel="canonical" href="./aozora/index.html">
          <p>Redirecting to <a href="./aozora/index.html">aozora API reference</a>.</p>
          HTML
          # GitHub Pages otherwise runs Jekyll and hides paths like `_sources`.
          touch site/.nojekyll

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
